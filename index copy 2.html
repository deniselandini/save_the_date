<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Busta Elegante Interattiva - Immagini Personalizzate</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap");

      :root {
        --envelope-x: 300px;
        --envelope-y: 200px;
        --envelope-bg: Moccasin;
        --envelope-shadow: Peru;
        --envelope-shadow: rgb(136, 136, 136);
        --letter-x: 250px;
        --letter-y: calc(250px - 1rem - 10px);
        --letter-bg: AntiqueWhite;
        --letter-shadow: BurlyWood;
        --letter-text: #180d07;
        --letter-font: "Dancing Script", serif;
        --letter-button-text: darkred;
        --heart-bg: darkred;
        --heart-text: white;
      }

      @media (min-width: 650px) {
        :root {
          --envelope-x: 600px;
          --envelope-y: 400px;
          --letter-x: 500px;
          --letter-y: calc(400px - 1rem - 10px);
        }
      }
      html {
        font-size: 20px;
      }
      body {
        background-color: darkred;
        background-color: white;
      }

      .cssletter {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
        margin: 24dvh 0;
      }

      .envelope {
        position: relative;
        width: var(--envelope-x);
        height: var(--envelope-y);
        background: var(--envelope-bg);
        box-shadow:
          inset 0 0 30px -5px var(--envelope-shadow),
          0 0 50vw 0 #757575;
        cursor: pointer;
      }

      .envelope::before {
        content: "˚ʚ❤︎ɞ˚";
        font-size: 5rem;
        color: white;
        position: absolute;
        left: 50%;
        top: 30%;
        transform: translate(-50%, -50%);
        mix-blend-mode: soft-light;
      }

      .envelope-flap {
        width: 100%;
        height: 70%;
        position: absolute;
        top: 0;
        z-index: 3;
        overflow: hidden;
        transition: 0.6s linear all;
        transform-origin: top;
        pointer-events: all;
      }

      .envelope-folds {
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 2;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }

      .envelope-flap::before,
      .envelope-left::before,
      .envelope-right::before,
      .envelope-bottom::before {
        content: "";
        transform: rotate(45deg);
        background: var(--envelope-bg);
        background: url("sfondo_25.png") center/cover;

        box-shadow: 0 0 30px -5px var(--envelope-shadow);
        width: 100%;
        aspect-ratio: 1;
        display: block;
        position: absolute;
        top: 60%;
      }

      .envelope-flap::before {
        border-radius: 5rem;
        bottom: 30px;
        border-radius: 5rem;
        top: auto;

        /* TODO */
        width: 110%;
        left: -22px;
      }

      @media (min-width: 650px) {
        .envelope-flap::before {
          bottom: 155px;
        }
      }

      .envelope-left::before {
        top: 10%;
        left: -65%;
      }

      .envelope-right::before {
        top: 10%;
        right: -65%;
      }

      .envelope-bottom::before {
        top: 55%;
        border-radius: 5rem;
      }

      .seal {
        position: absolute;
        bottom: 120px;
        left: 49.5%;
        transform: translate(-50%, 50%);
        width: 110px;
        height: 110px;
        z-index: 11;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .seal-image {
        width: 150%;
        height: 150%;
        object-fit: contain;
        /* Aggiungo un'ombra per far staccare il sigillo dalla busta */
        filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.5));
      }

      .envelope.open .envelope-flap {
        transform: rotateX(180deg);
        z-index: 2;
      }
      .envelope.extract-letter .letter {
        transform: translateY(-280px);
      }
      .envelope.zoom-fade {
        transform: scale(1.6) translateY(100px);
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <section class="cssletter">
      <div class="envelope" id="envelope">
        <div class="envelope-flap">
          <div class="seal" id="seal">
            <img src="sigillo.png" alt="Sigillo" class="seal-image" />
          </div>
        </div>
        <div class="envelope-folds">
          <div class="envelope-left"></div>
          <div class="envelope-right"></div>
          <div class="envelope-bottom"></div>
        </div>
      </div>
    </section>

    <script>
      const envelope = document.getElementById("envelope");

      envelope.addEventListener("click", () => {
        if (envelope.classList.contains("open")) return;

        envelope.classList.add("open");

        setTimeout(() => {
          envelope.classList.add("extract-letter");
        }, 800);

        setTimeout(() => {
          envelope.classList.add("zoom-fade");

          setTimeout(() => {
            // window.location.href = "busta.html";
            envelope.classList.remove("open", "extract-letter", "zoom-fade");
          }, 1200);
        }, 2500);
      });
    </script>
  </body>
</html>
